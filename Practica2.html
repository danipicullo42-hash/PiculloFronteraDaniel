<!DOCTYPE html>
<html>
<head>
    <title>Calculadora</title>
</head>
<body>

<h2>Calculadora</h2>

<input type="number" id="n1" placeholder="Número 1">
<input type="number" id="n2" placeholder="Número 2">

<br><br>

<button onclick="calcular('+')">Sumar</button>
<button onclick="calcular('-')">Restar</button>
<button onclick="calcular('*')">Multiplicar</button>
<button onclick="calcular('/')">Dividir</button>

<h3 id="res"></h3>

<script>
function calcular(op) {
    let a = parseFloat(document.getElementById("n1").value);
    let b = parseFloat(document.getElementById("n2").value);
    let resultado;

    if (op == '+') {
        resultado = a + b;
    } else if (op == '-') {
        resultado = a - b;
    } else if (op == '*') {
        resultado = a * b;
    } else if (op == '/') {
        if (b == 0) {
            resultado = "No se puede dividir por 0";
        } else {
            resultado = a / b;
        }
    }

    document.getElementById("res").innerHTML = resultado;
}
</script>

</body>
</html>
